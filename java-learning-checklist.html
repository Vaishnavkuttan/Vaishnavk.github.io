    cursor: pointer;

  }

  .item.hidden {

  }

    height: 20px;

    margin-top: 2px;

    align-items: center;
    gap: 6px;
    flex-wrap: wrap;

    font-weight: 500;
  }

    color: var(--muted);
  }

  .badge-nice { background: rgba(247,209,84,0.15); color: var(--nice); }
  .badge-skip { background: rgba(107,114,128,0.2); color: var(--skip); }
  .item-why {

    color: var(--muted);
    margin-top: 3px;

    display: flex;
    align-items: center;

    background: rgba(255, 138, 91, 0.12);

    font-weight: 600;
    text-decoration: none;
    margin-top: 2px;
    white-space: nowrap;

    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 20px;
    font-size: 0.85rem;
  }

</head>

let state = {};
let collapsedSections = {};
let activeFilter = 'all';

function slug(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-');
}

async function loadState() {
  try {
    const result = await window.storage.get('java-tracker-progress');
    if (result && result.value) {
      state = JSON.parse(result.value);
    }
  } catch (e) {
    state = {};
  }
}

async function saveState() {
  try {
    await window.storage.set('java-tracker-progress', JSON.stringify(state));
  } catch (e) {
    console.error('Save failed', e);
  }
}

function badgeClass(priority) {
  if (priority === 'Must Watch') return 'badge-must';
  if (priority === 'Nice to Know') return 'badge-nice';
  return 'badge-skip';
}

function render() {
  const root = document.getElementById('checklistRoot');
  root.innerHTML = '';

  let totalDone = 0;
  let totalItems = 0;
  let totalVisible = 0;

  data.forEach(section => {
    const secId = slug(section.section);
    const block = document.createElement('div');
    block.className = 'section-block';

    let secDone = 0;
    let secTotal = section.items.length;
    section.items.forEach(item => {
      const id = slug(section.section + '__' + item.topic);
      if (state[id]) secDone++;
    });

    const isCollapsed = !!collapsedSections[secId];

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-title">${section.section}</span>
      <span class="section-meta">
        <span>${secDone}/${secTotal}</span>
        <span class="section-chevron ${isCollapsed ? 'collapsed' : ''}">▾</span>
      </span>
    `;
    header.addEventListener('click', () => {
      collapsedSections[secId] = !collapsedSections[secId];
      render();
    });
    block.appendChild(header);

    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'section-items' + (isCollapsed ? ' collapsed' : '');

    section.items.forEach(item => {
      totalItems++;
      const id = slug(section.section + '__' + item.topic);
      const checked = !!state[id];
      if (checked) totalDone++;

      const matchesFilter = activeFilter === 'all' || item.priority === activeFilter;
      if (matchesFilter) totalVisible++;

      const el = document.createElement('div');
      el.className = 'item' + (checked ? ' checked' : '') + (matchesFilter ? '' : ' hidden');

      const hasLink = item.link && item.link.trim().length > 0;
      const watchHref = hasLink ? item.link : '#';
      const watchClass = hasLink ? 'watch-link' : 'watch-link disabled';

      el.innerHTML = `
        <div class="checkbox">${checked ? '✓' : ''}</div>
        <div class="item-text">
          <div class="item-title-row">
            <span class="item-title">${item.topic}</span>
            <span class="badge ${badgeClass(item.priority)}">${item.priority}</span>
          </div>
          <div class="item-why">${item.why}</div>
        </div>
        <a class="${watchClass}" href="${watchHref}" target="_blank" rel="noopener">▶ Watch</a>
      `;
      el.addEventListener('click', async (e) => {
        if (e.target.closest('.watch-link')) return;
        state[id] = !state[id];
        await saveState();
        render();
      });
      itemsWrap.appendChild(el);
    });

    block.appendChild(itemsWrap);
    root.appendChild(block);
  });

  document.getElementById('progressText').textContent = `${totalDone} / ${totalItems} completed`;
  const pct = totalItems ? Math.round((totalDone / totalItems) * 100) : 0;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

document.getElementById('filterBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  render();
});

async function init() {
  await loadState();
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('checklistRoot').style.display = 'block';
  render();
}

document.getElementById('resetBtn').addEventListener('click', async () => {
  state = {};
  await saveState();
  render();
});

init();
</script>
